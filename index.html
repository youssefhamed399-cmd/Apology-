<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى دودو 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ------------------ الأساسيات والخلفية الفخمة ------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 30%, #2d0a1a, #0f030a);
            overflow: hidden;
            padding: 20px;
            margin: 0;
        }

        /* ---------- قلبات طايرة في الخلفية (تأثير سحري) ---------- */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            color: rgba(212, 175, 55, 0.3);
            animation: floatUp linear infinite;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        .heart-float:nth-child(1) {
            left: 5%;
            animation-duration: 14s;
            font-size: 30px;
            animation-delay: 0s;
        }
        .heart-float:nth-child(2) {
            left: 15%;
            animation-duration: 18s;
            font-size: 18px;
            animation-delay: 2s;
        }
        .heart-float:nth-child(3) {
            left: 30%;
            animation-duration: 12s;
            font-size: 40px;
            animation-delay: 4s;
        }
        .heart-float:nth-child(4) {
            left: 50%;
            animation-duration: 20s;
            font-size: 22px;
            animation-delay: 1s;
        }
        .heart-float:nth-child(5) {
            left: 70%;
            animation-duration: 16s;
            font-size: 35px;
            animation-delay: 3s;
        }
        .heart-float:nth-child(6) {
            left: 85%;
            animation-duration: 13s;
            font-size: 25px;
            animation-delay: 5s;
        }
        .heart-float:nth-child(7) {
            left: 40%;
            animation-duration: 22s;
            font-size: 15px;
            animation-delay: 6s;
        }
        .heart-float:nth-child(8) {
            left: 92%;
            animation-duration: 17s;
            font-size: 28px;
            animation-delay: 2s;
        }

        /* ---------- حاوية المنتصف ---------- */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* ---------- إضاءة خلف الظرف (الغلوه) ---------- */
        .glow-effect {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
        }

        /* ---------- تصميم الظرف الفخم 3D ---------- */
        .envelope-wrapper {
            cursor: pointer;
            position: relative;
            z-index: 5;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }
        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            width: 340px;
            height: 220px;
            background: #7a0f2b;
            background: linear-gradient(145deg, #9e1a36, #5a0a1e);
            position: relative;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(212, 175, 55, 0.2), inset 0 0 30px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.4);
            transition: box-shadow 0.5s;
        }

        .envelope.open {
            box-shadow: 0 20px 80px rgba(212, 175, 55, 0.4), 0 0 60px rgba(255, 0, 100, 0.3);
        }

        /* الغطاء المثلث */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 110px solid #b31b3a;
            border-top-color: #c4244b;
            border-radius: 12px 12px 0 0;
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 3;
            filter: drop-shadow(0 -5px 15px rgba(0, 0, 0, 0.4));
        }

        /* إطار دهبي على حافة الغطاء */
        .flap::after {
            content: '';
            position: absolute;
            top: -110px;
            left: -170px;
            width: 340px;
            height: 110px;
            border-bottom: 3px solid #D4AF37;
            border-radius: 50%;
            opacity: 0.3;
        }

        .envelope.open .flap {
            transform: rotateX(180deg);
        }

        /* جسم الظرف */
        .body {
            background: linear-gradient(145deg, #8f122b, #4d0819);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            z-index: 1;
            position: relative;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* النص المكتوب على الظرف */
        .to-dodo {
            color: #D4AF37;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ffe68f, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            font-family: 'Tajawal', sans-serif;
        }

        /* الختم الأحمر بالشمع (على الغطاء) */
        .wax-seal {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #8b0000);
            border-radius: 50%;
            z-index: 6;
            border: 3px solid #D4AF37;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5), inset 0 -5px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            transition: all 0.5s;
            pointer-events: none;
        }
        .wax-seal span {
            transform: rotate(0deg);
            filter: drop-shadow(0 0 10px gold);
        }
        .envelope.open .wax-seal {
            opacity: 0;
            transform: translateX(-50%) scale(0) rotate(180deg);
        }

        /* القلب اللي جوه الظرف (يظهر بعد الفتح) */
        .heart-inside {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #ffd700;
            opacity: 0;
            transition: all 1s ease 0.6s;
            z-index: 5;
            text-shadow: 0 0 50px #ff1493, 0 0 100px #ff1493;
            pointer-events: none;
        }

        .envelope.open .heart-inside {
            opacity: 1;
            animation: pulseGold 1.2s infinite;
        }

        @keyframes pulseGold {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                text-shadow: 0 0 80px #ff1493, 0 0 150px #ff1493;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* ---------- الرسالة والزر (يظهرون بعد الفتح) ---------- */
        #messageArea {
            display: none;
            text-align: center;
            margin-top: 40px;
            animation: fadeSlideUp 0.8s ease;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-message {
            font-size: 26px;
            font-weight: 500;
            color: #fff4e6;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1.5px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: inline-block;
            letter-spacing: 1px;
        }

        .reveal-message span {
            color: #D4AF37;
            font-weight: 900;
        }

        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #b8860b);
            color: #1a0b1a;
            border: none;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: 900;
            font-family: 'Tajawal', sans-serif;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 30px rgba(212, 175, 55, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            border: 1px solid #ffe68f;
        }

        .btn-gold:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #ffe68f, #d4af37);
            color: #0f030a;
        }

        .btn-gold:active {
            transform: scale(0.95);
        }

        /* ---------- التوافق مع الموبايل ---------- */
        @media (max-width: 500px) {
            .envelope {
                width: 260px;
                height: 170px;
            }
            .flap {
                border-left-width: 130px;
                border-right-width: 130px;
                border-top-width: 85px;
            }
            .flap::after {
                top: -85px;
                left: -130px;
                width: 260px;
                height: 85px;
            }
            .to-dodo {
                font-size: 22px;
            }
            .wax-seal {
                width: 45px;
                height: 45px;
                top: 40px;
                font-size: 20px;
            }
            .heart-inside {
                font-size: 40px;
            }
            .reveal-message {
                font-size: 20px;
                padding: 15px 25px;
            }
            .btn-gold {
                padding: 14px 35px;
                font-size: 20px;
            }
            .glow-effect {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- 🔥 القفل بالرقم السري (2025)              -->
    <!-- ========================================== -->
    <script>
        // الرقم السري (غيّر 2025 إلى الرقم الذي تريده)
        const PASSWORD = "2025";
        
        const userPassword = prompt("🔒 ادخلي الرقم السري يا دودو:");
        if (userPassword !== PASSWORD) {
            document.body.innerHTML = "<h1 style='color: #D4AF37; text-align: center; margin-top: 20%; font-family: Tajawal;'>⛔ عذراً، الرقم السري غير صحيح</h1>";
            document.body.style.background = "#0f030a";
        }
    </script>

    <!-- ---------- قلوب طايرة في الخلفية ---------- -->
    <div class="floating-hearts">
        <div class="heart-float">❤️</div>
        <div class="heart-float">💛</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💖</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💗</div>
        <div class="heart-float">❤️</div>
        <div class="heart-float">💕</div>
    </div>

    <!-- ---------- المحتوى الأساسي ---------- -->
    <div class="container">

        <!-- الإضاءة الخلفية الذهبية -->
        <div class="glow-effect"></div>

        <!-- الظفر -->
        <div class="envelope-wrapper" onclick="openEnvelope()">
            <div class="envelope">
                <!-- الغطاء المثلث -->
                <div class="flap"></div>
                <!-- ختم الشمع الأحمر -->
                <div class="wax-seal"><span>❤️</span></div>
                <!-- جسم الظرف -->
                <div class="body">
                    <span class="to-dodo">إلى دودو 💌</span>
                </div>
                <!-- القلب الجواه (يظهر بعد الفتح) -->
                <div class="heart-inside">❤️‍🔥</div>
            </div>
        </div>

        <!-- الرسالة والزر (مخفيين في الأول) -->
        <div id="messageArea">
            <p class="reveal-message">
                دودو.. <span>جاهزة</span> تسمعي الاعتذار؟
            </p>
            <button class="btn-gold" onclick="window.location.href='page2.html'">
                أنا جاهز ❤️
            </button>
        </div>
    </div>

    <script>
        function openEnvelope() {
            const env = document.querySelector('.envelope');
            // لو مش مفتوح، نفتحه
            if (!env.classList.contains('open')) {
                env.classList.add('open');
                // نأخر ظهور الرسالة عشان نشوف أنيميشن الفتح
                setTimeout(() => {
                    document.getElementById('messageArea').style.display = 'block';
                    // نلفت نظرها للأسفل بشكل ناعم
                    document.getElementById('messageArea').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 900);
            }
        }
    </script>

</body>
    </html>
