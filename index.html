<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى دودو 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        /* شكل الظرف */
        .envelope-wrapper {
            cursor: pointer;
        }
        .envelope {
            width: 280px;
            height: 180px;
            background: #b31b3a;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .envelope:hover { transform: scale(1.03); }

        /* الغطاء المثلث */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 90px solid #d42d4f;
            border-radius: 8px 8px 0 0;
            transform-origin: top;
            transition: transform 0.8s ease;
            z-index: 3;
        }
        /* لما الظرف يفتح، الغطاء يروح لفوق */
        .envelope.open .flap {
            transform: rotateX(180deg);
        }

        .body {
            background: #b31b3a;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 1;
            position: relative;
        }
        .to-dodo {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
            letter-spacing: 2px;
        }

        /* القلب اللي جوه الظهر */
        .heart-inside {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #ffd700;
            opacity: 0;
            transition: all 1s ease 0.5s;
            z-index: 5;
            text-shadow: 0 0 30px #ff1493;
        }
        .envelope.open .heart-inside {
            opacity: 1;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* الرسالة والزر اللي بيظهروا بعد الفتح */
        .reveal-message {
            font-size: 24px;
            color: #4a0e1e;
            font-weight: bold;
            background: rgba(255,215,0,0.2);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid #D4AF37;
            margin-top: 30px;
        }
        .btn-gold {
            background: #D4AF37;
            color: #1a0b1a;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }
        .btn-gold:hover {
            transform: scale(1.05);
            background: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الظرف -->
        <div class="envelope-wrapper" onclick="openEnvelope()">
            <div class="envelope">
                <div class="flap"></div>
                <div class="body">
                    <span class="to-dodo">إلى دودو 💌</span>
                </div>
                <div class="heart-inside">❤️</div>
            </div>
        </div>

        <!-- الرسالة والزر (مخفيين في الأول) -->
        <div id="messageArea" style="display: none; text-align: center;">
            <p class="reveal-message">دودو.. جاهزة تسمعي الاعتذار؟</p>
            <button class="btn-gold" onclick="alert('استنى لما تنزل الصفحة التانية وهتشتغل 🥰')">أنا جاهز ❤️</button>
        </div>
    </div>

    <script>
        function openEnvelope() {
            const env = document.querySelector('.envelope');
            // منع إنها تفتح أكثر من مرة عشان ما يخربش
            if (!env.classList.contains('open')) {
                env.classList.add('open');
                // بعد ثانية من فتح الظرف، تظهر الرسالة والزر
                setTimeout(() => {
                    document.getElementById('messageArea').style.display = 'block';
                }, 1000);
            }
        }
    </script>
</body>
</html>
